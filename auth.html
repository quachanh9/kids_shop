<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Đăng nhập / Đăng ký</title>
        <link rel="stylesheet" href="auth.css">
    </head>
    
    <body>
    <header>
        <h2>Bemohome</h2>
        <nav>
            <a href="index.html">Trang chủ</a>
        </nav>
    </header>
    
        <div class="container">
            <div class="form-box">

                <!-- LOGIN -->
                 <form id="loginForm">
                    <h2>Đăng nhập</h2>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                    <button type="submit">Đăng nhập</button>
                    <p>
                        Chưa có tài khoản?
                        <span id="showRegister">Đăng ký</span>
                    </p>
                 </form>

                <!-- REGISTER -->
                 <form id="registerForm" class="hidden">
                    <h2>Đăng ký</h2>
                    <input type="text" id="registerUsername" placeholder="Họ và tên" required>
                    <input type="email" id="registerEmail" placeholder="Email" required>
                    <input type="password" id="registerPassword" placeholder="Mật khẩu" required>
                    <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                    <button type="submit">Đăng ký</button>
                    <p>
                        Đã có tài khoản?
                        <span id="showLogin">Đăng nhập</span>
                    </p>
                 </form>
            </div>
        </div>
        <script src="auth.js"></script>
    </body>
</html>
