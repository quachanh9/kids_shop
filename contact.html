<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Bemohome</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- HEADER -->
    <header>
       <h2>Bemohome</h2>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="product.html">Sản phẩm</a>
            <a href="cart.html" class="nav-icon">🛒</a>
            <a href="history.html" class="nav-icon">📦</a>
            <a href="contact.html">Liên hệ</a>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Tìm sản phẩm...">
        </div>

        <div class="user-box">
            <span id="welcomeUser">Xin chào</span>
            <button class="logout-btn">Đăng xuất</button>
        </div> 
    </header>

    <!-- CONTACT -->

    <section class="contact-page">

        <div class="contact-title">
            <h1>Liên hệ với Bemohome</h1>
            <p>Chúng tôi luôn sẵn sàng hỗ trợ khách hàng 24/7</p>
        </div>

        <div class="contact-container">

            <!-- LEFT -->

            <div class="contact-info">

                <h2>Thông tin liên hệ</h2>

                <div class="info-item">
                    <h3>Địa chỉ</h3>
                    <p>123 Cầu Giấy, Hà Nội</p>
                </div>

                <div class="info-item">
                    <h3>Hotline</h3>
                    <p>0962 999 999</p>
                </div>

                <div class="info-item">
                    <h3>Email</h3>
                    <p>bemohome2706@gmail.com</p>
                </div>

                <div class="info-item">
                    <h3>Thời gian làm việc</h3>
                    <p>8h00 - 22h00 tất cả các ngày trong tuần</p>
                </div>

                <div class="social-contact">

                    <a href="https://facebook.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
                    </a>

                    <a href="https://tiktok.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
                    </a>

                    <a href="https://shopee.vn" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968919.png">
                    </a>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="contact-form">

                <h2>Gửi tin nhắn</h2>

                <form>

                    <input type="text" placeholder="Họ và tên">

                    <input type="email" placeholder="Email">

                    <input type="text" placeholder="Số điện thoại">

                    <textarea placeholder="Nhập nội dung liên hệ..."></textarea>

                    <button type="submit">
                        Gửi liên hệ
                    </button>

                </form>

            </div>

        </div>

        <!-- MAP -->

        <div class="map-box">

            <iframe 
                src="https://www.google.com/maps?q=Hà Nội&output=embed">
            </iframe>

        </div>

    </section>
    <script src="script.js"></script>

</body>
</html>
