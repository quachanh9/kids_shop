<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Thanh toán</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h2>Bemohome</h2>
            <nav>
                <a href="index.html">Trang chủ</a>
                <a href="product.html">Sản phẩm</a>
                <a href="cart.html" class="nav-icon">🛒</a>
                <a href="history.html" class="nav-icon">📦</a>
                <a href="contact.html">Liên hệ</a>
            </nav>

            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm sản phẩm...">
            </div>

            <div class="user-box">
                <span id="welcomeUser">Xin chào</span>
                <button class="logout-btn">Đăng xuất</button>
            </div>
        </header>

        <h1>Thanh toán</h1>

        <div class="checkout-container">
            <!-- Thông tin khách hàng -->
            <div class="customer-info">
                <h2>Thông tin khách hàng</h2>
                <input type="text" id="name" placeholder="Họ và tên" readonly>
                <input type="text" id="phone" placeholder="Số điện thoại">
                <input type="text" id="address" placeholder="Địa chỉ cụ thể">
                
                <div class="address-select">
                    <select id="province">
                        <option>Chọn tỉnh / thành phố</option>
                    </select>

                    <select id="district">
                        <option>Chọn quận / huyện</option>
                    </select>

                    <select id="ward">
                        <option>Chọn phường / xã</option>
                    </select>

                    <div class="payment-method">
                        <h3>Phương thức thanh toán</h3>
                        <label class="payment-item">
                            <input type="radio" name="payment" value="cod" checked>
                            <img src="images/cod.png">
                            <span>Thanh toán khi nhận hàng</span>
                        </label>

                        <label class="payment-item">
                            <input type="radio" name="payment" value="bank">
                            <img src="images/qr.jpg">
                            <span>Chuyển khoản ngân hàng (QR Code)</span>
                        </label>
                    </div>

                </div>
            </div>
    
            <!-- Đơn hàng -->
            <div class="order-summary">
                <h2>Đơn hàng</h2>
                <div id="order-items"></div>
                <div class="voucher-box">
                    <input type="text" id="voucher" placeholder="Nhập mã giảm giá">
                </div>
                <div class="checkout-price">
                    <p>Phí vận chuyển: <span>30.000đ</span></p>
                    <h3 id="total">Tổng: 0đ</h3>
                </div>
                <button onclick="placeOrder()">Đặt hàng</button>
            </div> 

        </div>
        <script src="script.js"></script>
    </body>
</html>
