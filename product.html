<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Trang sản phẩm</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h2>Bemohome</h2>
            <nav>
                <a href="index.html">Trang chủ</a>
                <a href="product.html">Sản phẩm</a>
                <a href="cart.html" class="nav-icon">🛒</a>
                <a href="history.html" class="nav-icon">📦</a>
                <a href="#">Liên hệ</a>
            </nav>

            <!--SEARCH-->
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchHeader" 
                    placeholder="Tìm sản phẩm..." 
                    onkeyup="searchSuggest(event)"
                    onkeypress="handleSearch(event)"
                >
                <div id="suggestBox"></div>
            </div>
            <div class="user-box">
                <span id="userName"></span>
                <button id="logoutBtn">Đăng xuất</button>
            </div>
        </header>

        <h1 class="product-page-title">Danh sách sản phẩm</h1>

        <div class="filter-bar">
            <div class="filter-group">
                <label>Danh mục</label>
                <select id="filterCategory">
                    <option value="">Tất cả</option>
                    <option value="áo">Áo</option>
                    <option value="body">Body</option>
                    <option value="bộ">Bộ</option>
                    <option value="phụ kiện">Phụ kiện</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Kích thước</label>
                <select id="filterSize">
                    <option value="">Tất cả</option>
                    <option value="0-6M">0-6M</option>
                    <option value="6-12M">6-12M</option>
                    <option value="12-18M">12-18M</option>
                    <option value="18-24M">18-24M</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Sắp xếp</label>
                <select id="sortPrice">
                    <option value="">Mặc định</option>
                    <option value="low">Giá thấp -> cao</option>
                    <option value="high">Giá cao -> thấp</option>
                </select>
            </div>
        </div>

        <div id="product-container"></div>

        <script src="script.js"></script>
        
    </body>
</html>
